<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemiplas • Cálculo de Custos</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0e0e11;
            color: white;
            background-image: url('logo-translucido.png');
            background-size: 500px;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
            opacity: 0.98;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(0,0,0,0.80);
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #4aa3ff;
            font-size: 32px;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 40px;
            color: #4aa3ff;
            border-left: 4px solid #4aa3ff;
            padding-left: 10px;
        }

        label {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 5px;
            font-size: 16px;
        }

        .button {
            width: 100%;
            padding: 14px;
            background: #4aa3ff;
            border: none;
            border-radius: 10px;
            margin-top: 25px;
            font-size: 18px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
        }

        .button:hover {
            background: #74bdff;
        }

        .resultado-box {
            margin-top: 30px;
            padding: 20px;
            background: #11141a;
            border-radius: 12px;
            border: 1px solid #4aa3ff;
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Cálculo de Custos - Lemiplas</h1>

    <h2>Informações do Item</h2>

    <label>Nome do item (Pote, Tampa, etc)</label>
    <input id="nomeItem" placeholder="Digite o nome do item">

    <label>Peso unitário do item (g)</label>
    <input id="peso" type="number">

    <label>Valor do kg do material (R$)</label>
    <input id="valorKg" type="number">

    <label>Valor do kg do master (R$)</label>
    <input id="valorMaster" type="number">

    <label>Percentual de master (%)</label>
    <input id="percMaster" type="number">

    <label>Perca (%)</label>
    <input id="perca" type="number">

    <h2>Produção</h2>

    <label>Quantas unidades irá produzir?</label>
    <input id="qtdProducao" type="number">

    <label>Produção por hora (unidades)</label>
    <input id="producaoHora" type="number">

    <button class="button" onclick="calcular()">Calcular</button>

    <div id="resultado" class="resultado-box" style="display:none;"></div>
</div>

<script>
function calcular() {

    let nome = document.getElementById("nomeItem").value;
    let peso = Number(document.getElementById("peso").value);
    let valorKg = Number(document.getElementById("valorKg").value);
    let valorMaster = Number(document.getElementById("valorMaster").value);
    let percMaster = Number(document.getElementById("percMaster").value) / 100;
    let perca = Number(document.getElementById("perca").value) / 100;
    let qtd = Number(document.getElementById("qtdProducao").value);
    let prodHora = Number(document.getElementById("producaoHora").value);

    let pesoKg = peso / 1000;

    let materialTotal = qtd * pesoKg;
    let masterTotal = materialTotal * percMaster;
    let percaKg = (materialTotal + masterTotal) * perca;

    let totalGeralKg = materialTotal + masterTotal + percaKg;

    let custoMaterial = totalGeralKg * valorKg;
    let custoMaster = masterTotal * valorMaster;

    let custoUnit = (custoMaterial + custoMaster) / qtd;

    let horas = qtd / prodHora;
    let dias = horas / 10;

    document.getElementById("resultado").style.display = "block";

    document.getElementById("resultado").innerHTML = `
        <h2>Resumo</h2>
        <p><b>Item:</b> ${nome}</p>
        <p><b>Material total (kg):</b> ${materialTotal.toFixed(3)}</p>
        <p><b>Master total (kg):</b> ${masterTotal.toFixed(3)}</p>
        <p><b>Perca total (kg):</b> ${percaKg.toFixed(3)}</p>
        <p><b>Total geral (kg):</b> ${totalGeralKg.toFixed(3)}</p>
        <p><b>Custo do material:</b> R$ ${custoMaterial.toFixed(2)}</p>
        <p><b>Custo do master:</b> R$ ${custoMaster.toFixed(2)}</p>
        <p><b>Custo unitário (${nome}):</b> <b>R$ ${custoUnit.toFixed(4)}</b></p>
        <hr>
        <p><b>Dias necessários (10h/dia):</b> ${dias.toFixed(2)} dias</p>
    `;
}
</script>

</body>
</html>
