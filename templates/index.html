<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cálculo de Custo</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f1f1f1;
    }

    h2 {
        text-align: center;
    }

    .container {
        max-width: 900px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
    }

    .row {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
    }

    .row div {
        flex: 1;
    }

    input {
        width: 100%;
        padding: 8px;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #0077ff;
        color: white;
        border: none;
        font-size: 18px;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #005ccc;
    }

    #resultado {
        margin-top: 30px;
        padding: 20px;
        background: #e9e9e9;
        border-radius: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Custo</h2>

    <!-- LINHA 1 -->
    <div class="row">
        <div>
            <label>Peso do Produto (g):</label>
            <input type="number" id="peso" placeholder="Ex: 22">
        </div>

        <div>
            <label>Perda (%):</label>
            <input type="number" id="perda" placeholder="Ex: 3">
        </div>
    </div>

    <!-- LINHA 2 -->
    <div class="row">
        <div>
            <label>Preço do Material (kg):</label>
            <input type="number" id="preco" placeholder="Ex: 23">
        </div>

        <div>
            <label>Quantidade do Pedido (opcional):</label>
            <input type="number" id="pedido" placeholder="Deixe vazio se não quiser calcular">
        </div>
    </div>

    <!-- LINHA 3 -->
    <div class="row">
        <div>
            <label>ICMS (%):</label>
            <input type="number" id="icms" placeholder="Ex: 12">
        </div>

        <div>
            <label>PIS (%):</label>
            <input type="number" id="pis" placeholder="Ex: 1.65">
        </div>
    </div>

    <!-- LINHA 4 -->
    <div class="row">
        <div>
            <label>COFINS (%):</label>
            <input type="number" id="cofins" placeholder="Ex: 7.6">
        </div>

        <div>
            <label>Margem de Lucro (%):</label>
            <input type="number" id="lucro" placeholder="Ex: 20">
        </div>
    </div>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
</div>

<script src="script.js"></script>

</body>
</html>
